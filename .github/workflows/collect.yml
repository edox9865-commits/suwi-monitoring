name: 실시간 수위 수집 (HRFCO → Firestore)

# 한국망 대체 수집기: 해외 클라우드(Streamlit)는 HRFCO 연결이 막혀 있어,
# GitHub Actions에서 HRFCO 수위를 받아 Firestore에 저장한다. 웹은 Firestore만 읽는다.

on:
  schedule:
    - cron: "*/15 * * * *"   # 15분마다 (UTC 기준, HRFCO는 KST로 조회)
  workflow_dispatch:          # 수동 실행 버튼

# 이전 실행이 겹치면 취소
concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 의존성 설치
        run: pip install requests pandas
      - name: 수집 실행
        run: python collector.py 24
